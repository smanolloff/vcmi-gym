name: Build VastAI docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        default: "latest"
        description: "Additional tag"


# Sets the permissions granted to the `GITHUB_TOKEN` in this job.
permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  vastai-docker:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Registry login
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.REGISTRY }}/smanolloff/vcmi-gym
          tags: |
            type=sha

      - name: Build and push
        id: build_and_push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ./misc/vastai/docker/Dockerfile
          secrets: |
            aws_access_key=${{ secrets.AWS_ACCESS_KEY }}
            aws_secret_key=${{ secrets.AWS_SECRET_KEY }}
          tags: |
              ${{ env.REGISTRY }}/smanolloff/vcmi-gym:${{ github.sha }}
              ${{ env.REGISTRY }}/smanolloff/vcmi-gym:${{ inputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false  # https://github.com/docker/buildx/issues/1990#issuecomment-1666435850
          push: true
          cache-from: type=gha
          cache-to: type=gha
